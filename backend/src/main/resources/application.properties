spring.application.name=QueueMS

# Firebase service account JSON (on classpath) - for Firestore database only
firebase.service.account.path=classpath:firebase-service-account.json

# Backend JWT config loaded from .env
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Google OAuth2 is optional. With the default "auto" value, it is enabled when
# GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET exist. Set GOOGLE_OAUTH_ENABLED=false
# to force-disable it.
app.oauth2.google.enabled=${GOOGLE_OAUTH_ENABLED:auto}
#
# Required for Google login:
# GOOGLE_CLIENT_ID=<your Google OAuth client id>
# GOOGLE_CLIENT_SECRET=<your Google OAuth client secret>
# Google Cloud redirect URI: http://localhost:8080/login/oauth2/code/google

# Frontend URL for redirects after OAuth2 login
app.frontend.url=http://localhost:5173

# Country code for Public Holiday API
app.country-code=PH

# Supporting document upload configuration (Cloudinary)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:queuems/service-request-attachments}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# SMTP Configuration (usually set via environment variables)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
app.mail.from=${SMTP_FROM:${SMTP_USERNAME:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
